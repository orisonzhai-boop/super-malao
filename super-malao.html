// ===== level.mjs =====
export const TILE = 32;

const SOLID = new Set(['#', 'B', '?', 'P', 'U']); // 'U' = spent '?' block (still solid)
export function isSolidChar(ch) { return SOLID.has(ch); }

export function makeLevel(rows) {
  const grid = rows.map((r) => r.split(''));
  const coins = [], goombas = [];
  let flagCol = -1;
  for (let r = 0; r < grid.length; r++) {
    for (let c = 0; c < grid[r].length; c++) {
      const ch = grid[r][c];
      if (ch === 'o') { coins.push({ col: c, row: r }); grid[r][c] = ' '; }
      else if (ch === 'g') { goombas.push({ col: c, row: r }); grid[r][c] = ' '; }
      else if (ch === 'F') { if (flagCol < 0) flagCol = c; grid[r][c] = ' '; }
    }
  }
  const stripped = grid.map((r) => r.join(''));
  const cols = Math.max(...stripped.map((r) => r.length));
  return { grid: stripped, rows: stripped.length, cols, tile: TILE, coins, goombas, flagCol };
}

export function tileChar(level, col, row) {
  if (row < 0 || row >= level.grid.length) return ' ';
  if (col < 0) return '#';                       // left edge is a solid wall
  const line = level.grid[row];
  if (col >= line.length) return ' ';            // past right end = open
  return line[col];
}

export function isSolid(level, col, row) { return isSolidChar(tileChar(level, col, row)); }

// Replace a single tile in the (mutable) level grid. Used to "spend" a '?' block.
export function setTile(level, col, row, ch) {
  if (row < 0 || row >= level.grid.length) return;
  const line = level.grid[row];
  if (col < 0 || col >= line.length) return;
  level.grid[row] = line.slice(0, col) + ch + line.slice(col + 1);
}

// When an upward move was just stopped (head bonk), find a '?' tile directly above
// the player's head. Returns { col, row } of the bumped block, or null.
export function questionBumpTile(player, level) {
  const t = level.tile;
  const row = Math.round(player.y / t) - 1; // player.y snaps to (row+1)*t on a ceiling hit
  const cL = Math.floor(player.x / t);
  const cR = Math.floor((player.x + player.w - 1) / t);
  for (let c = cL; c <= cR; c++) {
    if (tileChar(level, c, row) === '?') return { col: c, row };
  }
  return null;
}

function buildLevel() {
  const COLS = 88, ROWS = 14;
  const g = Array.from({ length: ROWS }, () => Array(COLS).fill(' '));
  const set = (r, c, ch) => { if (r >= 0 && r < ROWS && c >= 0 && c < COLS) g[r][c] = ch; };
  const isGap = (c) => (c >= 31 && c <= 33) || (c >= 51 && c <= 52);
  for (let c = 0; c < COLS; c++) { if (!isGap(c)) { set(12, c, '#'); set(13, c, '#'); } }
  set(8, 7, 'B'); set(8, 8, '?'); set(8, 9, '?'); set(8, 10, 'B'); set(8, 20, '?');
  set(7, 8, 'o'); set(7, 9, 'o'); set(6, 25, 'o'); set(6, 26, 'o'); set(6, 27, 'o');
  set(9, 36, 'o'); set(9, 37, 'o');
  set(10, 15, 'P'); set(11, 15, 'P');
  set(9, 40, 'P'); set(10, 40, 'P'); set(11, 40, 'P');
  set(11, 22, 'g'); set(11, 45, 'g'); set(11, 60, 'g');
  set(11, 84, 'F');
  return g.map((row) => row.join(''));
}

export const LEVEL = buildLevel();


// ===== physics.mjs =====


export const PHYS = {
  gravity: 0.8, maxFall: 14,
  accel: 0.8, decel: 1.1, maxRun: 4.5,
  jumpVel: -15, jumpCut: -5,
  coyote: 6, buffer: 6,
};

export function makePlayer(x, y) {
  return {
    x, y, w: 24, h: 58, vx: 0, vy: 0,
    onGround: false, facing: 1, coyote: 0, buffer: 0, jumpHeld: false,
    state: 'idle', justJumped: false,
  };
}

// Move box along one axis by delta and resolve against solid tiles.
// Picks the nearest blocking face so tall/wide boxes resolve correctly. Mutates box.
export function moveAxis(box, level, axis, delta) {
  if (delta === 0) return false;
  const t = level.tile;
  const from = box[axis];          // position before the move
  box[axis] += delta;              // tentative position after the move
  const to = box[axis];
  // Sweep: scan every cell the box overlaps anywhere between `from` and `to`,
  // so a large delta that overshoots a tile still resolves against it.
  const lo = Math.min(from, to), hi = Math.max(from, to);
  let c0, c1, r0, r1;
  if (axis === 'x') {
    c0 = Math.floor(lo / t); c1 = Math.floor((hi + box.w - 1) / t);
    r0 = Math.floor(box.y / t); r1 = Math.floor((box.y + box.h - 1) / t);
  } else {
    c0 = Math.floor(box.x / t); c1 = Math.floor((box.x + box.w - 1) / t);
    r0 = Math.floor(lo / t); r1 = Math.floor((hi + box.h - 1) / t);
  }
  let hit = false, best = null;
  for (let r = r0; r <= r1; r++) {
    for (let c = c0; c <= c1; c++) {
      if (!isSolid(level, c, r)) continue;
      hit = true;
      let edge;
      if (axis === 'x') edge = delta > 0 ? c * t - box.w : (c + 1) * t;
      else edge = delta > 0 ? r * t - box.h : (r + 1) * t;
      if (best === null) best = edge;
      else best = delta > 0 ? Math.min(best, edge) : Math.max(best, edge);
    }
  }
  if (hit) box[axis] = best;
  return hit;
}

// Row of the solid tile the player is resting on, or -1 if airborne.
// Probes the tile row just beneath the feet and requires the feet to be at/near
// that row's top, so a player resting on a tile boundary stays reliably grounded.
export function groundedRow(player, level) {
  if (player.vy < 0) return -1;            // moving up = not grounded
  const t = level.tile;
  const feetY = player.y + player.h;
  const probeRow = Math.floor((feetY + 1) / t);
  if (feetY < probeRow * t - 2) return -1; // feet floating above the row
  const cL = Math.floor((player.x + 1) / t);
  const cR = Math.floor((player.x + player.w - 2) / t);
  for (let c = cL; c <= cR; c++) {
    if (isSolid(level, c, probeRow)) return probeRow;
  }
  return -1;
}

// Advance the player one fixed step. input: {left,right,jump}. Mutates and returns player.
export function stepPlayer(player, input, level) {
  const P = PHYS;
  player.justJumped = false; // one-frame flag: true only on the step a jump launches
  if (input.left && !input.right) { player.vx -= P.accel; player.facing = -1; }
  else if (input.right && !input.left) { player.vx += P.accel; player.facing = 1; }
  else if (player.vx > 0) player.vx = Math.max(0, player.vx - P.decel);
  else if (player.vx < 0) player.vx = Math.min(0, player.vx + P.decel);
  player.vx = Math.max(-P.maxRun, Math.min(P.maxRun, player.vx));

  if (input.jump && !player.jumpHeld) player.buffer = P.buffer; // rising edge = pressed
  player.jumpHeld = input.jump;
  if (player.buffer > 0) player.buffer--;
  if (player.coyote > 0) player.coyote--;

  if (player.buffer > 0 && player.coyote > 0) {
    player.vy = P.jumpVel;
    player.buffer = 0;
    player.coyote = 0;
    player.onGround = false;
    player.justJumped = true;
  }
  if (!input.jump && player.vy < P.jumpCut) player.vy = P.jumpCut; // variable jump height

  player.vy = Math.min(P.maxFall, player.vy + P.gravity);

  moveAxis(player, level, 'x', player.vx);
  const hitY = moveAxis(player, level, 'y', player.vy);
  if (hitY) player.vy = 0; // stopped by floor (landing) or ceiling (head bonk)

  // Sticky ground detection: keeps the player grounded when resting on a tile
  // boundary (no per-frame onGround/y jitter) and refreshes coyote time.
  const gr = groundedRow(player, level);
  if (gr >= 0) {
    player.y = gr * level.tile - player.h; // snap feet to the ground tile's top
    player.vy = 0;
    player.onGround = true;
    player.coyote = P.coyote;
  } else {
    player.onGround = false;
  }

  if (!player.onGround) player.state = 'jump';
  else if (Math.abs(player.vx) > 0.3) player.state = 'run';
  else player.state = 'idle';
  return player;
}


// ===== entities.mjs =====


export function makeEnemy(x, y) {
  // y is the top of the tile the enemy stands in; rest it on the tile floor below.
  const h = 24, w = 28;
  return { x, y: y + (TILE - h), w, h, vx: -1.2, dir: -1, alive: true };
}

// Patrol horizontally; reverse at walls and at ledges (no ground ahead). Mutates enemy.
export function stepEnemy(enemy, level) {
  if (!enemy.alive) return enemy;
  const t = level.tile;
  enemy.x += enemy.vx;

  const aheadX = enemy.vx > 0 ? enemy.x + enemy.w : enemy.x;
  const col = Math.floor(aheadX / t);
  const rowMid = Math.floor((enemy.y + enemy.h / 2) / t);
  if (isSolid(level, col, rowMid)) {
    enemy.x -= enemy.vx;        // back out of the wall
    enemy.vx = -enemy.vx;
  }

  const footCol = enemy.vx > 0 ? Math.floor((enemy.x + enemy.w) / t) : Math.floor(enemy.x / t);
  const belowRow = Math.floor((enemy.y + enemy.h + 1) / t);
  if (!isSolid(level, footCol, belowRow)) enemy.vx = -enemy.vx;

  enemy.dir = Math.sign(enemy.vx) || enemy.dir;
  return enemy;
}

// Returns 'stomp' | 'hit' | null.
export function stompCheck(player, enemy) {
  if (!enemy.alive) return null;
  const overlap =
    player.x < enemy.x + enemy.w && player.x + player.w > enemy.x &&
    player.y < enemy.y + enemy.h && player.y + player.h > enemy.y;
  if (!overlap) return null;
  const playerFeet = player.y + player.h;
  if (player.vy > 0 && playerFeet - enemy.y < enemy.h * 0.7) return 'stomp';
  return 'hit';
}


// ===== state.mjs =====
export function initialGame() {
  return { phase: 'TITLE', score: 0, coins: 0, lives: 3 };
}

// Pure reducer. event: { type: 'start'|'coin'|'stomp'|'death'|'respawn'|'win'|'reset' }
export function reduce(state, event) {
  const s = { ...state };
  switch (event.type) {
    case 'start':
      if (s.phase === 'TITLE' || s.phase === 'GAMEOVER') {
        return { ...initialGame(), phase: 'PLAYING' };
      }
      break;
    case 'coin':
      if (s.phase === 'PLAYING') { s.coins += 1; s.score += 100; }
      break;
    case 'stomp':
      if (s.phase === 'PLAYING') { s.score += 200; }
      break;
    case 'death':
      if (s.phase === 'PLAYING') {
        s.lives -= 1;
        s.phase = s.lives <= 0 ? 'GAMEOVER' : 'DEAD';
      }
      break;
    case 'respawn':
      if (s.phase === 'DEAD') s.phase = 'PLAYING';
      break;
    case 'win':
      if (s.phase === 'PLAYING') s.phase = 'WIN';
      break;
    case 'reset':
      return initialGame();
  }
  return s;
}


// ===== audio.mjs =====
// Web Audio SFX synthesized at runtime — no audio asset files.
export function createAudio() {
  let ctx = null;
  let muted = false;
  const ensure = () => {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  };
  function beep(freq, dur, type = 'square', slideTo = null) {
    if (muted) return;
    const ac = ensure();
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, ac.currentTime);
    if (slideTo) o.frequency.linearRampToValueAtTime(slideTo, ac.currentTime + dur);
    g.gain.setValueAtTime(0.08, ac.currentTime);
    g.gain.linearRampToValueAtTime(0.0001, ac.currentTime + dur);
    o.connect(g).connect(ac.destination);
    o.start();
    o.stop(ac.currentTime + dur);
  }
  return {
    jump: () => beep(300, 0.18, 'square', 720),
    coin: () => { beep(880, 0.07, 'square'); setTimeout(() => beep(1320, 0.12, 'square'), 70); },
    stomp: () => beep(180, 0.12, 'sawtooth', 70),
    death: () => beep(520, 0.5, 'triangle', 70),
    win: () => [523, 659, 784, 1046].forEach((f, i) => setTimeout(() => beep(f, 0.18, 'square'), i * 140)),
    toggleMute: () => { muted = !muted; return muted; },
    isMuted: () => muted,
  };
}


// ===== input.mjs =====
// Returns a live keys object mutated by keyboard events.
export function createInput() {
  const keys = { left: false, right: false, jump: false, start: false, restart: false, mute: false };
  const map = {
    ArrowLeft: 'left', KeyA: 'left',
    ArrowRight: 'right', KeyD: 'right',
    Space: 'jump', ArrowUp: 'jump', KeyW: 'jump',
    Enter: 'start', KeyR: 'restart', KeyM: 'mute',
  };
  const prevent = new Set(['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight']);
  window.addEventListener('keydown', (e) => {
    const k = map[e.code];
    if (k) { keys[k] = true; if (prevent.has(e.code)) e.preventDefault(); }
  });
  window.addEventListener('keyup', (e) => { const k = map[e.code]; if (k) keys[k] = false; });
  return keys;
}


// ===== render.mjs =====


export const VIEW_W = 800;
export const VIEW_H = 448;

const C = {
  sky: '#9bd6ff', hill: '#62b545', cloud: '#ffffff',
  dirt: '#c77b3a', grass: '#6abe30', dirtLine: '#9c5a26',
  brick: '#b5651d', brickLine: '#7c4310',
  qblock: '#f4b400', qStroke: '#a06f00', qText: '#7a5300',
  used: '#b08a5a', usedLine: '#7c5a30',
  pipe: '#2ea44f', pipeStroke: '#1b7a37',
  coin: '#ffd23f', coinStroke: '#c79400',
  goomba: '#9c5a2c', goombaFoot: '#6b3b18',
  pole: '#bdbdbd', flag: '#e24b4a', flagStroke: '#a32d2d',
  hud: 'rgba(0,0,0,0.55)', hudText: '#ffffff', hudCoin: '#ffd23f', hudLife: '#ff8a8a',
  overlay: 'rgba(0,0,0,0.6)', overlayText: '#ffffff',
};

// Build a solid-white silhouette of an image (for the outline halo).
export function makeWhiteMask(img) {
  const o = document.createElement('canvas');
  o.width = img.width; o.height = img.height;
  const x = o.getContext('2d');
  x.drawImage(img, 0, 0);
  x.globalCompositeOperation = 'source-in';
  x.fillStyle = '#ffffff';
  x.fillRect(0, 0, o.width, o.height);
  return o;
}

function drawHero(ctx, img, mask, dx, dy, dw, dh, facing) {
  ctx.save();
  ctx.translate(dx + dw / 2, 0);
  ctx.scale(facing < 0 ? -1 : 1, 1);
  const ox = -dw / 2;
  const offs = [[-3, 0], [3, 0], [0, -3], [0, 3], [-2, -2], [2, 2], [-2, 2], [2, -2]];
  for (const [a, b] of offs) ctx.drawImage(mask, ox + a, dy + b, dw, dh);
  ctx.drawImage(img, ox, dy, dw, dh);
  ctx.restore();
}

function drawBackground(ctx, camX) {
  ctx.fillStyle = C.sky;
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  ctx.fillStyle = C.hill;
  const px = -((camX * 0.4) % 400);
  for (let i = -1; i < 4; i++) {
    const hx = px + i * 400;
    ctx.beginPath();
    ctx.ellipse(hx + 120, VIEW_H - 64, 150, 90, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.fillStyle = C.cloud;
  const cx = -((camX * 0.25) % 360);
  for (let i = -1; i < 4; i++) {
    const x = cx + i * 360 + 80, y = 70 + (i % 2) * 30;
    ctx.beginPath();
    ctx.ellipse(x, y, 34, 16, 0, 0, Math.PI * 2);
    ctx.ellipse(x - 24, y + 6, 22, 13, 0, 0, Math.PI * 2);
    ctx.ellipse(x + 26, y + 6, 24, 13, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawTile(ctx, ch, sx, sy) {
  if (ch === '#') {
    ctx.fillStyle = C.dirt; ctx.fillRect(sx, sy, TILE, TILE);
    ctx.fillStyle = C.grass; ctx.fillRect(sx, sy, TILE, 8);
    ctx.strokeStyle = C.dirtLine; ctx.lineWidth = 1;
    ctx.strokeRect(sx + 0.5, sy + 0.5, TILE - 1, TILE - 1);
  } else if (ch === 'B') {
    ctx.fillStyle = C.brick; ctx.fillRect(sx, sy, TILE, TILE);
    ctx.strokeStyle = C.brickLine; ctx.lineWidth = 2;
    ctx.strokeRect(sx + 1, sy + 1, TILE - 2, TILE - 2);
    ctx.beginPath(); ctx.moveTo(sx, sy + TILE / 2); ctx.lineTo(sx + TILE, sy + TILE / 2);
    ctx.moveTo(sx + TILE / 2, sy); ctx.lineTo(sx + TILE / 2, sy + TILE); ctx.stroke();
  } else if (ch === '?') {
    ctx.fillStyle = C.qblock; ctx.fillRect(sx, sy, TILE, TILE);
    ctx.strokeStyle = C.qStroke; ctx.lineWidth = 2; ctx.strokeRect(sx + 1, sy + 1, TILE - 2, TILE - 2);
    ctx.fillStyle = C.qText; ctx.font = '20px monospace'; ctx.textAlign = 'center';
    ctx.fillText('?', sx + TILE / 2, sy + TILE / 2 + 7);
  } else if (ch === 'P') {
    ctx.fillStyle = C.pipe; ctx.fillRect(sx, sy, TILE, TILE);
    ctx.strokeStyle = C.pipeStroke; ctx.lineWidth = 2; ctx.strokeRect(sx + 1, sy + 1, TILE - 2, TILE - 2);
  } else if (ch === 'U') {
    ctx.fillStyle = C.used; ctx.fillRect(sx, sy, TILE, TILE);
    ctx.strokeStyle = C.usedLine; ctx.lineWidth = 2; ctx.strokeRect(sx + 1, sy + 1, TILE - 2, TILE - 2);
    ctx.fillStyle = C.usedLine; ctx.fillRect(sx + TILE / 2 - 5, sy + TILE / 2 - 1, 10, 3);
  }
}

function drawTiles(ctx, level, cam) {
  const startCol = Math.max(0, Math.floor(cam.x / TILE));
  const endCol = Math.min(level.cols - 1, Math.floor((cam.x + VIEW_W) / TILE) + 1);
  for (let r = 0; r < level.rows; r++) {
    for (let c = startCol; c <= endCol; c++) {
      const ch = tileChar(level, c, r);
      if (ch !== ' ') drawTile(ctx, ch, c * TILE - cam.x, r * TILE);
    }
  }
}

function drawCoins(ctx, coins, cam, spin) {
  ctx.lineWidth = 2;
  for (const co of coins) {
    if (co.taken) continue;
    const x = co.col * TILE + TILE / 2 - cam.x;
    const y = co.row * TILE + TILE / 2;
    if (x < -16 || x > VIEW_W + 16) continue;
    const rx = 8 * Math.abs(Math.cos(spin * 0.1 + co.col));
    ctx.fillStyle = C.coin; ctx.strokeStyle = C.coinStroke;
    ctx.beginPath(); ctx.ellipse(x, y, Math.max(2, rx), 10, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  }
}

function drawEnemies(ctx, enemies, cam) {
  for (const e of enemies) {
    if (!e.alive) continue;
    const x = e.x - cam.x, y = e.y;
    if (x < -40 || x > VIEW_W + 40) continue;
    ctx.fillStyle = C.goomba;
    ctx.beginPath(); ctx.ellipse(x + e.w / 2, y + 8, e.w / 2, 12, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillRect(x + 2, y + 6, e.w - 4, e.h - 6);
    ctx.fillStyle = C.goombaFoot;
    ctx.fillRect(x + 1, y + e.h - 5, 9, 5); ctx.fillRect(x + e.w - 10, y + e.h - 5, 9, 5);
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(x + e.w / 2 - 6, y + 6, 4, 0, Math.PI * 2); ctx.arc(x + e.w / 2 + 6, y + 6, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(x + e.w / 2 - 6, y + 7, 2, 0, Math.PI * 2); ctx.arc(x + e.w / 2 + 6, y + 7, 2, 0, Math.PI * 2); ctx.fill();
  }
}

function drawFlag(ctx, level, cam) {
  if (level.flagCol < 0) return;
  const x = level.flagCol * TILE + TILE / 2 - cam.x;
  if (x < -40 || x > VIEW_W + 40) return;
  ctx.strokeStyle = C.pole; ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(x, 2 * TILE); ctx.lineTo(x, 12 * TILE); ctx.stroke();
  ctx.fillStyle = C.flag; ctx.strokeStyle = C.flagStroke; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(x, 2 * TILE + 4); ctx.lineTo(x + 40, 2 * TILE + 16);
  ctx.lineTo(x, 2 * TILE + 28); ctx.closePath(); ctx.fill(); ctx.stroke();
}

function drawHUD(ctx, game) {
  ctx.fillStyle = C.hud; ctx.fillRect(16, 14, 300, 34);
  ctx.font = '16px monospace'; ctx.textAlign = 'left';
  ctx.fillStyle = C.hudText; ctx.fillText(`Score ${game.score}`, 28, 37);
  ctx.fillStyle = C.hudCoin; ctx.fillText(`Coins ${game.coins}`, 140, 37);
  ctx.fillStyle = C.hudLife; ctx.fillText(`Lives ${game.lives}`, 240, 37);
}

function drawOverlay(ctx, lines) {
  ctx.fillStyle = C.overlay; ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  ctx.fillStyle = C.overlayText; ctx.textAlign = 'center';
  ctx.font = '36px sans-serif';
  ctx.fillText(lines[0], VIEW_W / 2, VIEW_H / 2 - 20);
  ctx.font = '18px sans-serif';
  for (let i = 1; i < lines.length; i++) ctx.fillText(lines[i], VIEW_W / 2, VIEW_H / 2 + 20 + (i - 1) * 28);
}

// Main draw entry. world={player,enemies,coins}; assets={images,masks,natural}; anim=frame counter.
export function drawScene(ctx, cam, level, world, game, assets, anim) {
  ctx.clearRect(0, 0, VIEW_W, VIEW_H);
  drawBackground(ctx, cam.x);
  drawTiles(ctx, level, cam);
  drawCoins(ctx, world.coins, cam, anim);
  drawFlag(ctx, level, cam);
  drawEnemies(ctx, world.enemies, cam);

  const p = world.player;
  let frame = 'idle';
  if (p.state === 'jump') frame = 'jump';
  else if (p.state === 'run') frame = (Math.floor(anim / 8) % 2 === 0) ? 'runA' : 'runB';
  const img = assets.images[frame], mask = assets.masks[frame], nat = assets.natural[frame];
  const dh = 64, dw = dh * (nat.w / nat.h);
  const dx = p.x + p.w / 2 - dw / 2 - cam.x;
  const dy = p.y + p.h - dh + 4;
  ctx.save(); ctx.globalAlpha = 0.18; ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(p.x + p.w / 2 - cam.x, p.y + p.h, 16, 5, 0, 0, Math.PI * 2); ctx.fill(); ctx.restore();
  drawHero(ctx, img, mask, dx, dy, dw, dh, p.facing);

  drawHUD(ctx, game);

  if (game.phase === 'TITLE') drawOverlay(ctx, ['超级玛拉奥 / Super Malao', '按 Enter 开始', '← → 移动 · 空格跳 · M 静音']);
  else if (game.phase === 'DEAD') drawOverlay(ctx, ['你挂了', `按 R 继续 (剩 ${game.lives} 命)`]);
  else if (game.phase === 'GAMEOVER') drawOverlay(ctx, ['Game Over', '按 Enter 重来']);
  else if (game.phase === 'WIN') drawOverlay(ctx, ['通关！', `得分 ${game.score} · 按 Enter 重来`]);
}


// ===== main.mjs =====









const SPAWN = { x: 2 * TILE, y: 0 };
const STEP = 1000 / 60;

function loadImages(map) {
  const names = Object.keys(map);
  return Promise.all(names.map((n) => new Promise((res) => {
    const img = new Image();
    img.onload = () => res([n, img]);
    img.src = map[n];
  }))).then((pairs) => Object.fromEntries(pairs));
}

function freshWorld(level) {
  return {
    player: makePlayer(SPAWN.x, SPAWN.y),
    enemies: level.goombas.map((g) => makeEnemy(g.col * TILE, g.row * TILE)),
    coins: level.coins.map((c) => ({ ...c, taken: false })),
  };
}

function clampCamera(px, level) {
  const x = px - VIEW_W / 2;
  return { x: Math.max(0, Math.min(level.cols * TILE - VIEW_W, x)) };
}

export async function boot() {
  const canvas = document.getElementById('game');
  canvas.width = VIEW_W; canvas.height = VIEW_H;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true;

  const images = await loadImages(SPRITES);
  const masks = Object.fromEntries(Object.keys(images).map((n) => [n, makeWhiteMask(images[n])]));
  const assets = { images, masks, natural: SPRITE_NATURAL };

  const input = createInput();
  const audio = createAudio();
  let level = makeLevel(LEVEL);

  let game = initialGame();
  let world = freshWorld(level);
  let cam = { x: 0 };
  let anim = 0;
  let prevStart = false, prevRestart = false, prevMute = false;

  // Full restart rebuilds the level from the immutable LEVEL template so spent
  // '?' blocks (mutated to 'U' in place) are restored for a fresh playthrough.
  function resetRun() { level = makeLevel(LEVEL); world = freshWorld(level); cam = { x: 0 }; }
  // Respawn after a death keeps level/world progress (coins, kills, spent blocks); only the player + camera reset.
  function respawn() { world.player = makePlayer(SPAWN.x, SPAWN.y); cam = { x: 0 }; }

  function update() {
    anim++;
    const startEdge = input.start && !prevStart;
    const restartEdge = input.restart && !prevRestart;
    const muteEdge = input.mute && !prevMute;
    prevStart = input.start; prevRestart = input.restart; prevMute = input.mute;
    if (muteEdge) audio.toggleMute();

    if (game.phase === 'TITLE' || game.phase === 'GAMEOVER') {
      if (startEdge) { game = reduce(game, { type: 'start' }); resetRun(); }
      return;
    }
    if (game.phase === 'WIN') {
      if (startEdge) { game = reduce(game, { type: 'reset' }); game = reduce(game, { type: 'start' }); resetRun(); }
      return;
    }
    if (game.phase === 'DEAD') {
      if (restartEdge) { game = reduce(game, { type: 'respawn' }); respawn(); }
      return;
    }

    // PLAYING
    const p = world.player;
    const vyBefore = p.vy;
    stepPlayer(p, { left: input.left, right: input.right, jump: input.jump }, level);
    if (p.justJumped) audio.jump(); // covers ground, coyote, and buffered jumps

    // '?' block bump: an upward move stopped this frame (head bonk) over a '?' tile pops a coin
    if (vyBefore < 0 && p.vy === 0) {
      const bumped = questionBumpTile(p, level);
      if (bumped) {
        setTile(level, bumped.col, bumped.row, 'U');
        game = reduce(game, { type: 'coin' });
        audio.coin();
      }
    }

    for (const e of world.enemies) stepEnemy(e, level);

    // player vs enemies
    for (const e of world.enemies) {
      const res = stompCheck(p, e);
      if (res === 'stomp') { e.alive = false; p.vy = -8; game = reduce(game, { type: 'stomp' }); audio.stomp(); }
      else if (res === 'hit') { game = reduce(game, { type: 'death' }); audio.death(); break; }
    }

    // coins
    for (const co of world.coins) {
      if (co.taken) continue;
      const cx = co.col * TILE, cy = co.row * TILE;
      if (p.x < cx + TILE && p.x + p.w > cx && p.y < cy + TILE && p.y + p.h > cy) {
        co.taken = true; game = reduce(game, { type: 'coin' }); audio.coin();
      }
    }

    // pit death
    if (p.y > level.rows * TILE + 32 && game.phase === 'PLAYING') { game = reduce(game, { type: 'death' }); audio.death(); }

    // win at flag
    if (level.flagCol >= 0 && p.x + p.w / 2 >= level.flagCol * TILE && game.phase === 'PLAYING') {
      game = reduce(game, { type: 'win' }); audio.win();
    }

    cam = clampCamera(p.x + p.w / 2, level);
  }

  let acc = 0, last = performance.now();
  function frame(now) {
    acc += now - last; last = now;
    let steps = 0;
    while (acc >= STEP && steps < 5) {
      update();
      acc -= STEP; steps++;
    }
    drawScene(ctx, cam, level, world, game, assets, anim);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  window.__GAME__ = { get state() { return game; }, get player() { return world.player; }, input };
}

if (typeof window !== 'undefined' && typeof document !== 'undefined') {
  window.addEventListener('DOMContentLoaded', () => { boot(); });
}
